name: Test Action

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-local-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script (SVG, no commit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python action/main.py \
            --owner octocat \
            --repo Hello-World \
            --lang en \
            --format svg \
            --output-dir ./output \
            --commit-to-readme false

      - name: Verify SVG output
        run: test -f ./output/stars.svg

      - name: Run script (PNG)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python action/main.py \
            --owner octocat \
            --repo Hello-World \
            --lang en \
            --format png \
            --output-dir ./output \
            --commit-to-readme false

      - name: Verify PNG output
        run: test -f ./output/stars.png

      - name: Verify custom filename
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python action/main.py \
            --owner octocat \
            --repo Hello-World \
            --lang en \
            --format svg \
            --output-dir ./output \
            --filename custom-chart.svg \
            --commit-to-readme false
          test -f ./output/custom-chart.svg

      - name: Verify README update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python action/main.py \
            --owner octocat \
            --repo Hello-World \
            --lang en \
            --format svg \
            --output-dir . \
            --readme-path ./README.test.md \
            --commit-to-readme true
          grep -q "star-history-chart:start" ./README.test.md
          grep -q "./stars.svg" ./README.test.md
          test -f ./stars.svg

      - name: Upload sample chart
        uses: actions/upload-artifact@v7
        with:
          name: test-chart
          path: output/

  test-composite-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run composite action
        id: star-chart
        uses: ./
        with:
          owner: octocat
          repo: Hello-World
          language: en
          image-format: svg
          output-dir: .
          commit-to-readme: "false"

      - name: Print action outputs
        run: |
          echo "Image: ${{ steps.star-chart.outputs.image-path }}"
          echo "Format: ${{ steps.star-chart.outputs.image-format }}"
          echo "Total stars: ${{ steps.star-chart.outputs.total-stars }}"

      - name: Verify action output exists
        run: test -f "${{ steps.star-chart.outputs.image-path }}"
